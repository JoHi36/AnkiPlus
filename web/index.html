<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anki Chatbot</title>
  <!-- QWebChannel für Anki-Bridge (nur in Anki verfügbar) -->
  <script>
    // Nur laden wenn in Anki (qrc:// Protokoll verfügbar)
    // Im Browser wird das Script nicht geladen, was OK ist
    try {
      if (window.location.protocol === 'qrc:') {
        const script = document.createElement('script');
        script.src = 'qrc:///qtwebchannel/qwebchannel.js';
        script.onerror = () => console.log('QWebChannel nicht verfügbar (Browser-Modus)');
        document.head.appendChild(script);
      }
    } catch (e) {
      console.log('QWebChannel kann nicht geladen werden (Browser-Modus)');
    }
  </script>
  <!-- CACHE BUSTING: Append timestamp to force reload -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <script type="module" crossorigin src="./assets/main-_p8A3K2U.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/main-BjlOG-Fw.css">
</head>
<body>
  <!-- DEBUG: visible fallback if React doesn't mount -->
  <div id="debug-fallback" style="position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;padding:8px;font-size:12px;font-family:monospace;z-index:99999;display:none;word-break:break-all;"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var d = document.getElementById('debug-fallback');
      d.style.display = 'block';
      d.textContent = 'JS ERROR: ' + msg + ' @ ' + src + ':' + line;
    };
    window.addEventListener('unhandledrejection', function(e) {
      var d = document.getElementById('debug-fallback');
      d.style.display = 'block';
      d.textContent = 'UNHANDLED PROMISE: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
    });
  </script>
  <div id="root"></div>
</body>
</html>
