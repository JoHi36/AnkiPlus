<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Plusi — Walk Cycle Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #141416;
    color: #f5f5f7;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    overflow-x: hidden;
  }
  .section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
    gap: 28px;
  }
  h1 { font-size: 20px; font-weight: 500; opacity: 0.7; letter-spacing: -0.3px; }
  h2 { font-size: 14px; font-weight: 500; opacity: 0.4; }
  .divider { width: 500px; height: 1px; background: rgba(255,255,255,0.06); margin: 0 auto; }

  .compare-row {
    display: flex;
    gap: 40px;
    align-items: flex-end;
    justify-content: center;
  }
  .compare-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .compare-card label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.3;
  }
  .compare-card .desc {
    font-size: 11px;
    opacity: 0.25;
    max-width: 120px;
    text-align: center;
    line-height: 1.4;
  }
  .svg-frame {
    width: 130px;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    background: rgba(255,255,255,0.015);
  }

  .walk-stage {
    position: relative;
    width: 700px;
    height: 180px;
    border-bottom: 2px solid rgba(255,255,255,0.06);
  }
  .walk-stage .ground-label {
    position: absolute;
    bottom: -20px;
    right: 8px;
    font-size: 10px;
    opacity: 0.15;
  }
  .home-slot {
    position: absolute;
    bottom: 28px;
    left: 40px;
    width: 54px;
    height: 54px;
    border: 1px dashed rgba(255,255,255,0.1);
    border-radius: 10px;
  }
  .home-slot::after {
    content: 'Home';
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    opacity: 0.2;
    white-space: nowrap;
  }
  .plusi-walker {
    position: absolute;
    bottom: 0;
    width: 48px;
    height: 48px;
    perspective: 200px;
  }
  .plusi-walker .plusi-body {
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
  }

  .controls {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .controls button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #f5f5f7;
    padding: 6px 16px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .controls button:hover { background: rgba(255,255,255,0.1); }
  .controls button.active { background: rgba(10,132,255,0.3); border-color: rgba(10,132,255,0.5); }
  .controls span { font-size: 11px; opacity: 0.3; }

  .cycle-stage {
    display: flex;
    gap: 60px;
    align-items: flex-end;
    justify-content: center;
  }
  .cycle-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .cycle-box label {
    font-size: 11px;
    opacity: 0.3;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .cycle-container {
    width: 140px;
    height: 160px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    perspective: 300px;
  }
</style>
</head>
<body>

<div class="section">
  <h1>Plusi Side View — Hybrid A+D</h1>
  <h2>Kapsel-Körper mit subtilen Schulter-Bumps</h2>
  <div class="compare-row">
    <div class="compare-card">
      <label>Front</label>
      <div class="svg-frame" id="staticFront"></div>
      <div class="desc">Original Kreuz</div>
    </div>
    <div class="compare-card">
      <label>Side →</label>
      <div class="svg-frame" id="hybridRight"></div>
      <div class="desc">Kapsel + Schulter-Nubs</div>
    </div>
    <div class="compare-card">
      <label>← Side</label>
      <div class="svg-frame" id="hybridLeft"></div>
      <div class="desc">Gespiegelt</div>
    </div>
  </div>
</div>

<div class="divider"></div>

<div class="section">
  <h2>Walk-Cycle: Schulter-Sway + Step-Bounce (isoliert)</h2>
  <div class="cycle-stage">
    <div class="cycle-box">
      <label>Langsam</label>
      <div class="cycle-container" id="cycleSlow"></div>
    </div>
    <div class="cycle-box">
      <label>Normal</label>
      <div class="cycle-container" id="cycleNormal"></div>
    </div>
    <div class="cycle-box">
      <label>Schnell</label>
      <div class="cycle-container" id="cycleFast"></div>
    </div>
  </div>
</div>

<div class="divider"></div>

<div class="section">
  <h2>Kompletter Ablauf: Fall → Walk → Stop → Jump → Home</h2>
  <div class="controls">
    <button id="btnPlay" class="active">▶ Abspielen</button>
    <button id="btnReset">↺ Reset</button>
    <span>Klick Play um die Sequenz zu sehen</span>
  </div>
  <div class="walk-stage" id="walkStage">
    <div class="home-slot"></div>
    <div class="plusi-walker" id="mainWalker">
      <div class="plusi-body" id="mainBody"></div>
    </div>
    <div class="ground-label">Bildschirmkante</div>
  </div>
</div>

<script>
// NOTE: This is a local-only preview file, not production code.
// All SVG content is statically defined (no user input), so DOM
// construction via parser is safe here.

var parser = new DOMParser();

function renderSVG(container, svgString) {
  var doc = parser.parseFromString(svgString, 'image/svg+xml');
  var svg = doc.documentElement;
  container.textContent = '';
  container.appendChild(document.adoptNode(svg));
}

function makeSideSVG(size, flip) {
  var s = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"'
    + ' width="' + size + '" height="' + size + '" overflow="visible"'
    + (flip ? ' style="transform: scaleX(-1);"' : '') + '>'
    + '<defs><filter id="gs' + (Math.random()*1e6|0) + '" x="-60%" y="-60%" width="220%" height="220%">'
    + '<feGaussianBlur stdDeviation="8"/></filter></defs>'
    + '<rect x="38" y="5" width="44" height="110" rx="12" fill="#0a84ff"/>'
    + '<rect x="27" y="38" width="16" height="32" rx="8" fill="#0a84ff" opacity="0.35"/>'
    + '<rect x="77" y="38" width="16" height="32" rx="8" fill="#0a84ff"/>'
    + '<ellipse cx="67" cy="49" rx="7" ry="8" fill="white"/>'
    + '<ellipse cx="69" cy="50" rx="4" ry="4" fill="#1a1a1a"/>'
    + '<path d="M 65 68 Q 72 72 78 68" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>'
    + '</svg>';
  return s;
}

function makeFrontSVG(size) {
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"'
    + ' width="' + size + '" height="' + size + '" overflow="visible">'
    + '<defs><filter id="gfr" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="8"/></filter></defs>'
    + '<rect x="40" y="5" width="40" height="110" rx="8" fill="#38bdf8" opacity="0.4" filter="url(#gfr)"/>'
    + '<rect x="5" y="35" width="110" height="40" rx="8" fill="#38bdf8" opacity="0.4" filter="url(#gfr)"/>'
    + '<rect x="40" y="5" width="40" height="110" rx="8" fill="#0a84ff"/>'
    + '<rect x="5" y="35" width="110" height="40" rx="8" fill="#0a84ff"/>'
    + '<rect x="40" y="35" width="40" height="40" fill="#0a84ff"/>'
    + '<ellipse cx="48" cy="49" rx="7" ry="8" fill="white"/>'
    + '<ellipse cx="72" cy="49" rx="7" ry="8" fill="white"/>'
    + '<ellipse cx="49" cy="50" rx="4" ry="4" fill="#1a1a1a"/>'
    + '<ellipse cx="71" cy="50" rx="4" ry="4" fill="#1a1a1a"/>'
    + '<path d="M 48 68 Q 60 74 72 68" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>'
    + '</svg>';
}

// Section 1: Static views
renderSVG(document.getElementById('staticFront'), makeFrontSVG(100));
renderSVG(document.getElementById('hybridRight'), makeSideSVG(100, false));
renderSVG(document.getElementById('hybridLeft'),  makeSideSVG(100, true));

// Section 2: Walk cycles
function createWalkCycle(container, stepDuration) {
  var el = document.createElement('div');
  el.style.cssText = 'width:96px; height:96px; transform-style:preserve-3d;';
  renderSVG(el, makeSideSVG(96, true));
  container.appendChild(el);

  var t = 0;
  var lastTime = performance.now();

  function animate(now) {
    var dt = (now - lastTime) / 1000;
    lastTime = now;
    t += dt;

    var phase = (t % stepDuration) / stepDuration;
    var stepPhase = phase * Math.PI * 2;

    // Step bounce: abs(sin) gives two peaks per cycle
    var bounce = Math.abs(Math.sin(stepPhase)) * 10;

    // Shoulder sway via rotateY
    var sway = Math.sin(stepPhase) * 22;

    // Body tilt synced to sway
    var tilt = Math.sin(stepPhase) * 3;

    el.style.transform = 'translateY(' + (-bounce) + 'px) rotateY(' + sway + 'deg) rotate(' + tilt + 'deg)';

    // Nub opacity depth simulation
    var nubs = el.querySelectorAll('rect[rx="8"]');
    if (nubs.length >= 2) {
      var fop = 0.5 + 0.5 * Math.sin(stepPhase);
      var bop = 0.5 - 0.4 * Math.sin(stepPhase);
      nubs[0].setAttribute('opacity', bop.toFixed(2));
      nubs[1].setAttribute('opacity', fop.toFixed(2));
    }

    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

createWalkCycle(document.getElementById('cycleSlow'),   1.4);
createWalkCycle(document.getElementById('cycleNormal'), 0.8);
createWalkCycle(document.getElementById('cycleFast'),   0.45);

// Section 3: Full sequence
var walker = document.getElementById('mainWalker');
var body   = document.getElementById('mainBody');
var btnPlay  = document.getElementById('btnPlay');
var btnReset = document.getElementById('btnReset');

var STATE = {
  phase: 'idle',
  x: 550, y: 0,
  vy: 0, vx: 0,
  homeX: 52, homeY: 28,
  t: 0, stepPhase: 0,
  facing: 'front'
};

var GRAVITY   = 1800;
var WALK_SPEED = 80;
var STEP_FREQ  = 5;
var lastFrame  = 0;
var sequenceRAF = null;

function resetState() {
  if (sequenceRAF) cancelAnimationFrame(sequenceRAF);
  STATE.phase = 'idle';
  STATE.x = 550;
  STATE.y = 120;
  STATE.vy = 0;
  STATE.vx = 0;
  STATE.t = 0;
  STATE.stepPhase = 0;
  STATE.facing = 'front';
  renderSVG(body, makeFrontSVG(48));
  body.style.transform = '';
  body.style.transition = '';
  updatePos();
}

function updatePos() {
  walker.style.left = STATE.x + 'px';
  walker.style.bottom = STATE.y + 'px';
}

function startSequence() {
  STATE.phase = 'falling';
  STATE.vy = 0;
  STATE.y = 120;
  STATE.facing = 'front';
  renderSVG(body, makeFrontSVG(48));
  lastFrame = performance.now();
  sequenceRAF = requestAnimationFrame(tick);
}

function tick(now) {
  var dt = Math.min((now - lastFrame) / 1000, 0.05);
  lastFrame = now;
  STATE.t += dt;

  switch (STATE.phase) {
    case 'falling':
      STATE.vy -= GRAVITY * dt;
      STATE.y += STATE.vy * dt;
      body.style.transform = 'rotate(' + (STATE.vy * 0.008) + 'deg)';
      if (STATE.y <= 0) {
        STATE.y = 0;
        STATE.vy = 0;
        STATE.phase = 'impact';
        STATE.t = 0;
        body.style.transform = 'scaleY(0.75) scaleX(1.15)';
        body.style.transition = 'transform 0.08s ease-out';
      }
      break;

    case 'impact':
      if (STATE.t > 0.12) {
        body.style.transform = 'scaleY(1) scaleX(1)';
        body.style.transition = 'transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1)';
      }
      if (STATE.t > 0.45) {
        STATE.phase = 'turning';
        STATE.t = 0;
        body.style.transition = 'transform 0.3s ease-in-out';
        body.style.transform = 'rotateY(90deg)';
      }
      break;

    case 'turning':
      if (STATE.t > 0.15 && STATE.facing !== 'side') {
        STATE.facing = 'side';
        renderSVG(body, makeSideSVG(48, true));
      }
      if (STATE.t > 0.3) {
        body.style.transition = 'none';
        body.style.transform = 'rotateY(0)';
        STATE.phase = 'walking';
        STATE.t = 0;
        STATE.stepPhase = 0;
      }
      break;

    case 'walking':
      STATE.stepPhase += dt * STEP_FREQ * Math.PI * 2;
      STATE.x -= WALK_SPEED * dt;

      var bounce = Math.abs(Math.sin(STATE.stepPhase)) * 8;
      STATE.y = bounce;

      var sway = Math.sin(STATE.stepPhase) * 20;
      var tilt = Math.sin(STATE.stepPhase) * 3.5;
      body.style.transform = 'rotateY(' + sway + 'deg) rotate(' + tilt + 'deg)';

      var nubs = body.querySelectorAll('rect[rx="8"]');
      if (nubs.length >= 2) {
        var fop = 0.5 + 0.5 * Math.sin(STATE.stepPhase);
        var bop = 0.5 - 0.4 * Math.sin(STATE.stepPhase);
        nubs[0].setAttribute('opacity', bop.toFixed(2));
        nubs[1].setAttribute('opacity', fop.toFixed(2));
      }

      if (STATE.x <= STATE.homeX + 10) {
        STATE.x = STATE.homeX + 5;
        STATE.phase = 'stopping';
        STATE.t = 0;
        STATE.y = 0;
      }
      break;

    case 'stopping':
      body.style.transform = 'rotateY(0) rotate(0)';
      if (STATE.t > 0.3) {
        STATE.phase = 'crouching';
        STATE.t = 0;
      }
      break;

    case 'crouching':
      var cp = Math.min(STATE.t / 0.2, 1);
      var sqY = 1 - cp * 0.2;
      var sqX = 1 + cp * 0.12;
      body.style.transform = 'scaleY(' + sqY + ') scaleX(' + sqX + ')';
      if (STATE.t > 0.25) {
        STATE.phase = 'jumping';
        STATE.t = 0;
        STATE.vy = 380;
        STATE.vx = -2;
        STATE.facing = 'front';
        renderSVG(body, makeFrontSVG(48));
        body.style.transform = 'scaleY(1.08) scaleX(0.94)';
      }
      break;

    case 'jumping':
      STATE.vy -= GRAVITY * dt;
      STATE.y += STATE.vy * dt;
      STATE.x += STATE.vx;

      var vn = STATE.vy / 380;
      body.style.transform = 'scaleY(' + (1 + vn * 0.08) + ') scaleX(' + (1 - vn * 0.05) + ')';

      if (STATE.vy < 0 && STATE.y <= STATE.homeY) {
        STATE.y = STATE.homeY;
        STATE.x = STATE.homeX;
        STATE.phase = 'snapping';
        STATE.t = 0;
        body.style.transform = 'scaleY(0.88) scaleX(1.08)';
        body.style.transition = 'transform 0.1s ease-out';
      }
      break;

    case 'snapping':
      if (STATE.t > 0.1) {
        body.style.transition = 'transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
        body.style.transform = 'scaleY(1) scaleX(1)';
      }
      if (STATE.t > 0.5) {
        STATE.phase = 'home';
      }
      break;

    case 'home':
      var floatY = Math.sin(STATE.t * 1.5) * 2;
      body.style.transition = 'none';
      body.style.transform = 'translateY(' + (-floatY) + 'px)';
      break;
  }

  updatePos();
  if (STATE.phase !== 'idle') {
    sequenceRAF = requestAnimationFrame(tick);
  }
}

btnPlay.addEventListener('click', function() {
  resetState();
  startSequence();
});
btnReset.addEventListener('click', resetState);

resetState();
</script>
</body>
</html>
